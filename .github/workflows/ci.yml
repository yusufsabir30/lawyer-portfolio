name: CI Pipeline

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu al
        uses: actions/checkout@v4

      - name: Docker Hub'a login ol
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Backend image build et ve push'la
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: yusufsabir30/talip-backend:latest

      - name: Frontend image build et ve push'la
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: yusufsabir30/talip-frontend:latest